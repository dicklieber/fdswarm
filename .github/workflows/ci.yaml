name: Build and Package

on:
  push:
    branches: [ main ]
    tags: [ '*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Optional package version, for example 1.2.3 or v1.2.3. Tag builds use the tag name.'
        required: false
        type: string

concurrency:
  group: build-and-package-${{ github.ref }}
  cancel-in-progress: true

env:
  FDSWARM_BUILD: ${{ github.run_number }}

jobs:
  package-assembly:
    name: Build Assembly JAR
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'pull_request' ||
      github.ref == 'refs/heads/main' ||
      github.ref_type == 'tag'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      checks: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set package version
        shell: bash
        env:
          DISPATCH_VERSION: ${{ inputs.release_version }}
        run: ./scripts/ci/set-package-version.sh

      - name: Set up JDK 21 (Full)
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'liberica'
          java-package: 'jdk+fx'

      - name: Cache Mill / Coursier
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/coursier
            ~/.mill
          key: ${{ runner.os }}-mill-${{ hashFiles('*.mill', '.mill-version', '.mill-jvm-version') }}
          restore-keys: |
            ${{ runner.os }}-mill-

      - name: Make mill executable
        run: chmod +x ./mill

      - name: Run tests
        continue-on-error: true
        run: xvfb-run -a ./mill --no-daemon fdswarm.test

      - name: Publish test results
        if: always()
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: 'out/fdswarm/test/**/*.xml'
          detailed_summary: true
          include_passed: true
          fail_on_failure: true

      - name: Generate HTML test report
        if: always()
        shell: bash
        run: |
          python -m pip install --upgrade pip junit2html
          mkdir -p out/reports
          xml_file="$(find out/fdswarm/test -name 'test-report.xml' | head -n 1)"
          test -n "$xml_file"
          junit2html "$xml_file" out/reports/test-report.html

      - name: Upload HTML test report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: Test-Report-HTML
          path: out/reports/test-report.html
          if-no-files-found: error
          retention-days: 3

      - name: Generate Scoverage reports
        if: always()
        run: |
          ./mill --no-daemon fdswarm.scoverage.htmlReport
          ./mill --no-daemon fdswarm.scoverage.xmlReport

      - name: Upload Scoverage HTML report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: Coverage-Report-HTML
          path: out/fdswarm/scoverage/htmlReport.dest/
          if-no-files-found: error
          retention-days: 3

      - name: Update Coverage Badge
        if: github.ref == 'refs/heads/main'
        run: |
          chmod +x scripts/update-coverage-badge.sh
          ./scripts/update-coverage-badge.sh

      - name: Commit and push badge update
        if: github.ref == 'refs/heads/main'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update coverage badge [skip ci]" --trailer "Co-authored-by: Junie <junie@jetbrains.com>" && git push)

      - name: Build docs site
        if: success()
        run: ./mill --no-daemon docs.site

      - name: Build assembly
        if: success()
        run: ./mill --no-daemon fdswarm.assembly

      - name: Name release JAR
        if: success()
        shell: bash
        run: ./scripts/ci/name-release-jar.sh

      - name: Upload JAR artifact
        if: success()
        uses: actions/upload-artifact@v6
        with:
          name: FdSwarm-Assembly-JAR
          path: |
            out/fdswarm/assembly.dest/fdswarm.jar
            out/fdswarm/assembly.dest/FdSwarm-*-assembly.jar
          if-no-files-found: error
          retention-days: 3

  docs-site:
    name: Build Documentation Site
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'pull_request' ||
      github.ref == 'refs/heads/main' ||
      github.ref_type == 'tag'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up JDK 21 (Full)
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'liberica'
          java-package: 'jdk+fx'

      - name: Cache Mill / Coursier
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/coursier
            ~/.mill
          key: ${{ runner.os }}-mill-${{ hashFiles('*.mill', '.mill-version', '.mill-jvm-version') }}
          restore-keys: |
            ${{ runner.os }}-mill-

      - name: Make mill executable
        run: chmod +x ./mill

      - name: Configure GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Build docs site
        run: ./mill --no-daemon docs.site

      - name: Package docs site
        run: |
          cd out/docs/site.dest/site
          zip -r ../docs-site.zip .

      - name: Upload docs artifact
        uses: actions/upload-artifact@v6
        with:
          name: Documentation-Site
          path: out/docs/site.dest/docs-site.zip
          if-no-files-found: error
          retention-days: 3

      - name: Upload GitHub Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: out/docs/site.dest/site/

  deploy-docs-site:
    name: Publish Documentation Site
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: docs-site
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  package-windows:
    name: Package Windows x64 (MSI)
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.ref_type == 'tag'
    runs-on: windows-latest
    timeout-minutes: 25
    needs: package-assembly

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set package version
        shell: pwsh
        env:
          DISPATCH_VERSION: ${{ inputs.release_version }}
        run: ./scripts/ci/set-package-version.ps1

      - name: Set up JDK 21 (Full)
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'liberica'
          java-package: 'jdk+fx'

      - name: Cache Mill / Coursier
        uses: actions/cache@v5
        with:
          path: |
            ~\.cache\coursier
            ~\.mill
          key: ${{ runner.os }}-mill-${{ hashFiles('*.mill', '.mill-version', '.mill-jvm-version') }}
          restore-keys: |
            ${{ runner.os }}-mill-

      - name: Download JAR artifact
        uses: actions/download-artifact@v6
        with:
          name: FdSwarm-Assembly-JAR
          path: out/fdswarm/assembly.dest

      - name: Build winMsi
        shell: pwsh
        run: ./scripts/ci/package-windows.ps1
        env:
          FDSWARM_ASSEMBLY_JAR: out/fdswarm/assembly.dest/fdswarm.jar

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v6
        with:
          name: FdSwarm-Windows-x64-MSI
          path: out/fdswarm/winMsi.dest/jpackage-win-*/*.msi
          if-no-files-found: error
          retention-days: 3

  package-windows-arm64:
    name: Package Windows ARM64 (MSI)
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.ref_type == 'tag'
    runs-on: windows-11-arm
    timeout-minutes: 30
    needs: package-assembly

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set package version
        shell: pwsh
        env:
          DISPATCH_VERSION: ${{ inputs.release_version }}
        run: ./scripts/ci/set-package-version.ps1

      - name: Set up JDK 21 ARM64 (Full)
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'liberica'
          java-package: 'jdk+fx'
          architecture: 'aarch64'

      - name: Cache Mill / Coursier
        uses: actions/cache@v5
        with:
          path: |
            ~\.cache\coursier
            ~\.mill
          key: ${{ runner.os }}-arm64-mill-${{ hashFiles('*.mill', '.mill-version', '.mill-jvm-version') }}
          restore-keys: |
            ${{ runner.os }}-arm64-mill-

      - name: Install WiX 3.14.1 binaries
        shell: pwsh
        run: ./scripts/ci/install-wix.ps1

      - name: Download JAR artifact
        uses: actions/download-artifact@v6
        with:
          name: FdSwarm-Assembly-JAR
          path: out/fdswarm/assembly.dest

      - name: Build winMsi ARM64
        shell: pwsh
        run: ./scripts/ci/package-windows.ps1
        env:
          FDSWARM_ASSEMBLY_JAR: out/fdswarm/assembly.dest/fdswarm.jar

      - name: Upload ARM64 MSI artifact
        uses: actions/upload-artifact@v6
        with:
          name: FdSwarm-Windows-ARM64-MSI
          path: out/fdswarm/winMsi.dest/jpackage-win-*/*.msi
          if-no-files-found: error
          retention-days: 3

  package-macos:
    name: Package macOS (PKG)
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.ref_type == 'tag'
    runs-on: macos-latest
    timeout-minutes: 25
    needs: package-assembly

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set package version
        shell: bash
        env:
          DISPATCH_VERSION: ${{ inputs.release_version }}
        run: ./scripts/ci/set-package-version.sh

      - name: Set up JDK 21 (Full)
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'liberica'
          java-package: 'jdk+fx'

      - name: Cache Mill / Coursier
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/coursier
            ~/.mill
          key: ${{ runner.os }}-mill-${{ hashFiles('*.mill', '.mill-version', '.mill-jvm-version') }}
          restore-keys: |
            ${{ runner.os }}-mill-

      - name: Download JAR artifact
        uses: actions/download-artifact@v6
        with:
          name: FdSwarm-Assembly-JAR
          path: out/fdswarm/assembly.dest

      - name: Make mill executable
        run: chmod +x ./mill

      - name: Build macPkg
        run: ./scripts/ci/package-macos.sh
        env:
          FDSWARM_ASSEMBLY_JAR: out/fdswarm/assembly.dest/fdswarm.jar

      - name: Upload PKG artifact
        uses: actions/upload-artifact@v6
        with:
          name: FdSwarm-macOS-PKG
          path: out/fdswarm/macPkg.dest/jpackage/*.pkg
          if-no-files-found: error
          retention-days: 3

  create-release:
    name: Create GitHub Release
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    needs: [docs-site, package-windows, package-windows-arm64, package-macos]
    permissions:
      contents: write

    steps:
      - name: Download JAR artifact
        uses: actions/download-artifact@v6
        with:
          name: FdSwarm-Assembly-JAR
          path: release-artifacts/jar

      - name: Download Windows x64 MSI artifact
        uses: actions/download-artifact@v6
        with:
          name: FdSwarm-Windows-x64-MSI
          path: release-artifacts/windows-x64

      - name: Download Windows ARM64 MSI artifact
        uses: actions/download-artifact@v6
        with:
          name: FdSwarm-Windows-ARM64-MSI
          path: release-artifacts/windows-arm64

      - name: Download macOS PKG artifact
        uses: actions/download-artifact@v6
        with:
          name: FdSwarm-macOS-PKG
          path: release-artifacts/macos

      - name: Download docs site artifact
        uses: actions/download-artifact@v6
        with:
          name: Documentation-Site
          path: release-artifacts/docs

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            release-artifacts/**/*.zip
            release-artifacts/jar/FdSwarm-*-assembly.jar
            release-artifacts/**/*.msi
            release-artifacts/**/*.pkg
          draft: false
          prerelease: false
          generate_release_notes: true
